{% extends 'base.html'%}
{% load static %}
{% block title %}登录{% endblock %}
{% block head %}
    <style>
        #loginBox {
            border: 2px solid #000 !important;
            border-radius: 8px !important;
            padding: 30px !important;
            width: 100%;
            max-width: 330px;
            color: #000 !important;
            /* 🔥 这里设置背景色为 rgb(180,180,180) 🔥 */
            background-color: rgb(220, 220, 220) !important;
        }

        /* 标题下方分割线样式 */
        .login-title-divider {
            height: 1px;
            background-color: #000;
            margin: 1rem auto 1.5rem auto;
            width: 80%;
        }

        .custom-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            color: white;
            border-radius: 5px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease-in-out, top 0.3s ease-in-out;
            pointer-events: none;
        }
        .custom-alert.success { background: #1a1d20; }
        .custom-alert.error { background: #1a1d20; }
        .custom-alert.info { background: darkred; }
        .custom-alert.show {
            opacity: 1;
            top: 30px;
            pointer-events: auto;
        }
    </style>
{% endblock %}

{% block main %}
    <div class="d-flex flex-column justify-content-center align-items-center" style="min-height: 100%;">
        <div id="loginBox">
            <h1 class="text-center mb-0">登录</h1>
            <div class="login-title-divider"></div>
            <form id="loginForm" action="{% url 'BLauth:login' %}" method="post">
                {% csrf_token %}
                <div class="mb-2">
                    <label>邮箱</label>
                    <input type="email" class="form-control" name="email" placeholder="请输入邮箱" value="{{ prev_email }}">
                </div>
                <div class="mb-2">
                    <label>密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入密码">
                </div>
                <div class="form-check mb-4 d-flex justify-content-between align-items-center">
                    <div>
                        <input class="form-check-input" type="checkbox" name="remember_me" value="1" id="checkDefault">
                        <label class="form-check-label mb-2" for="checkDefault">记住我</label>
                    </div>
                    <a href="{% url 'BLauth:forgot_password' %}" class="text-dark">忘记密码？</a>
                </div>
                <button class="btn btn-outline-dark w-100" type="submit">登录</button>
            </form>
        </div>
    </div>

    <script>
        function showCustomAlert(message, type = 'info', duration = 3000) {
            const oldAlert = document.querySelector('.custom-alert');
            if (oldAlert) oldAlert.remove();
            const alertBox = document.createElement('div');
            alertBox.className = `custom-alert ${type}`;
            alertBox.innerText = message;
            document.body.appendChild(alertBox);
            setTimeout(() => alertBox.classList.add('show'), 10);
            setTimeout(() => {
                alertBox.classList.remove('show');
                setTimeout(() => alertBox.remove(), 300);
            }, duration);
        }

        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', function(e) {
                const email = this.querySelector('input[name="email"]').value.trim();
                const password = this.querySelector('input[name="password"]').value.trim();
                if (!email || !password) {
                    e.preventDefault();
                    showCustomAlert('邮箱和密码均为必填项！', 'error');
                    return;
                }
            });

            {% if login_error %}
                showCustomAlert('邮箱或密码错误，请重新输入！', 'error');
            {% endif %}
            {% if empty_error %}
                showCustomAlert('邮箱和密码均为必填项！', 'error');
            {% endif %}
            {% if register_success %}
                showCustomAlert('注册成功！请登录', 'success');
            {% endif %}
            {% if messages %}
                {% for message in messages %}
                    showCustomAlert('{{ message }}', 'info');
                {% endfor %}
            {% endif %}
        });
    </script>
{% endblock %}
